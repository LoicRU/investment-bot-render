name: Investment Bot Scan

on:
  # Scan automatique chaque lundi à 8h00 UTC (10h Paris)
  schedule:
    - cron: '0 8 * * 1'

  # Permet aussi de lancer manuellement depuis GitHub
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run investment scan
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_THRESHOLD:    ${{ vars.ALERT_THRESHOLD || '75' }}
        run: python main.py
