name: Investment Bot Scan

on:
  schedule:
    - cron: '0 8 * * 1'    # Lundi 10h Paris
    - cron: '0 8 * * 3'    # Mercredi 10h Paris
    - cron: '0 8 * * 5'    # Vendredi 10h Paris
  workflow_dispatch:

# Permission explicite pour écrire dans le repo
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Créer dossier data
        run: mkdir -p data

      - name: Lancer le scan
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_THRESHOLD:   "55"
          MAX_ATTEMPTS:      "3"
          WAIT_BETWEEN:      "30"
          TICKERS_PER_SCAN:  "40"
          MAX_AI_CALLS:      "15"
        run: python main.py

      - name: Sauvegarder la mémoire dans Git
        if: always()
        run: |
          git config user.name  "Investment Bot"
          git config user.email "bot@investment.local"
          git add data/memory.json
          # Vérifier que le fichier existe et a changé
          if git diff --staged --quiet; then
            echo "Mémoire inchangée — pas de commit nécessaire"
          else
            git commit -m "🧠 Mise à jour mémoire [skip ci]"
            git push origin HEAD:main
            echo "✅ Mémoire sauvegardée dans Git"
          fi
