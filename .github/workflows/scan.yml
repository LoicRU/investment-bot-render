name: Investment Bot Scan

on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 3'
    - cron: '0 8 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Créer dossier data
        run: mkdir -p data

      - name: Lancer le scan
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_THRESHOLD:   "55"
          MAX_ATTEMPTS:      "3"
          WAIT_BETWEEN:      "30"
          TICKERS_PER_SCAN:  "40"
          MAX_AI_CALLS:      "15"
        run: python main.py

      - name: Sauvegarder mémoire + apprentissage dans Git
        if: always()
        run: |
          git config user.name  "Investment Bot"
          git config user.email "bot@investment.local"

          git add data/memory.json data/performance.json data/patterns.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "Données inchangées — pas de commit"
            exit 0
          fi

          git commit -m "🧠 Mise à jour mémoire + apprentissage [skip ci]"

          # Récupérer les changements distants
          git fetch origin main

          # Fusionner en favorisant TOUJOURS notre version locale
          # (les données du scan actuel sont les plus récentes et correctes)
          git merge -X ours origin/main --no-edit || true

          git push origin HEAD:main
          echo "✅ Données sauvegardées"
